name: FUASK Website Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          MONITOR_URLS: >-
            https://www.fuask.edu.ng/,
            https://www.fuask.edu.ng/admissions,
            https://www.fuask.edu.ng/about-us.php,
            https://www.fuask.edu.ng/academics,
            https://www.fuask.edu.ng/contact-us.php,
            https://www.fuask.edu.ng/student-portal,
            https://www.fuask.edu.ng/news,
            https://www.fuask.edu.ng/library
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TIMEOUT_SECONDS: "10"
          LATENCY_THRESHOLD_MS: "3000"
          HEARTBEAT_HOUR_WAT: "9"
          CHECK_RETRIES: "1"
          CHECK_RETRY_DELAY_SECONDS: "3"
          DRY_RUN: "false"
        run: python run_monitor.py

      - name: Commit updated state
        run: |
          git config user.name "fuask-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/status_history.json
          git diff --cached --quiet || git commit -m "Update monitor state"
          git push
